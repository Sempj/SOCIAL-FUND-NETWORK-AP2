<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Funders Network</title>
    <!-- Google Fonts & Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(45deg, #4a00e0, #8e2de2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        h1 span {
            background: #8e2de2;
            color: white;
            font-size: 0.9rem;
            padding: 4px 12px;
            border-radius: 30px;
            -webkit-text-fill-color: white;
            background: rgba(142, 45, 226, 0.8);
            backdrop-filter: blur(5px);
        }
        button {
            font-family: 'Poppins', sans-serif;
            padding: 12px 20px;
            border: none;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: linear-gradient(45deg, #8e2de2, #4a00e0);
            color: white;
            box-shadow: 0 4px 15px rgba(142, 45, 226, 0.3);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.95rem;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(142, 45, 226, 0.4);
        }
        button:active { transform: translateY(0); }
        button.secondary { background: linear-gradient(45deg, #ff512f, #dd2476); }
        button.danger { background: linear-gradient(45deg, #f85032, #e73827); }
        button.follow-btn { background: linear-gradient(45deg, #f7971e, #ffd200); color: #333; }
        input, textarea {
            font-family: 'Poppins', sans-serif;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 20px;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.9);
            transition: 0.3s;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #8e2de2;
            box-shadow: 0 0 0 3px rgba(142, 45, 226, 0.2);
        }
        textarea { min-height: 100px; resize: vertical; }
        .card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: 0.3s;
        }
        .card:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15); }
        .hidden { display: none; }
        .tabs {
            display: flex;
            gap: 10px;
            margin: 25px 0;
            overflow-x: auto;
            padding-bottom: 5px;
        }
        .tab {
            flex: 0 0 auto;
            padding: 10px 25px;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(5px);
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            color: #333;
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: 0.3s;
        }
        .tab.active {
            background: linear-gradient(45deg, #8e2de2, #4a00e0);
            color: white;
            border: none;
        }
        .wallet-info {
            background: rgba(227, 242, 253, 0.9);
            backdrop-filter: blur(5px);
            padding: 15px;
            border-radius: 20px;
            margin-bottom: 20px;
            word-break: break-all;
            border: 1px solid #bbdefb;
            font-size: 0.9rem;
        }
        .post-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }
        .post-actions button {
            padding: 8px 16px;
            font-size: 0.85rem;
            background: rgba(255, 255, 255, 0.8);
            color: #333;
            box-shadow: none;
            border: 1px solid #ddd;
        }
        .post-actions button:hover { background: white; }
        .comment {
            margin-left: 20px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 15px;
            margin-top: 10px;
            border-left: 3px solid #8e2de2;
        }
        .progress {
            width: 100%;
            height: 20px;
            background: #eee;
            border-radius: 30px;
            overflow: hidden;
            margin: 15px 0;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #8e2de2, #4a00e0);
            width: 0%;
        }
        .feed-toggle {
            display: flex;
            gap: 10px;
            margin: 15px 0;
        }
        .feed-toggle button {
            flex: 1;
            background: rgba(255, 255, 255, 0.5);
            color: #333;
            border: 1px solid #ddd;
        }
        .feed-toggle button.active {
            background: linear-gradient(45deg, #8e2de2, #4a00e0);
            color: white;
            border: none;
        }
        .footer-note {
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.8rem;
            margin-top: 30px;
        }
        i { margin-right: 5px; }
        img { max-width: 100%; border-radius: 15px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-hand-holding-heart"></i> Social Funders <span>Base</span></h1>

        <!-- Wallet Connection -->
        <div id="walletSection">
            <button id="connectBtn"><i class="fas fa-wallet"></i> Connect Wallet</button>
            <div id="walletInfo" class="wallet-info hidden"></div>
        </div>

        <!-- Main App -->
        <div id="app" class="hidden">
            <div class="tabs">
                <div class="tab active" data-tab="feed"><i class="fas fa-newspaper"></i> Feed</div>
                <div class="tab" data-tab="campaigns"><i class="fas fa-bullhorn"></i> Campaigns</div>
                <div class="tab" data-tab="admin" id="adminTab"><i class="fas fa-shield-alt"></i> Admin</div>
            </div>

            <!-- Feed Tab -->
            <div id="feedTab" class="tab-content">
                <h3><i class="fas fa-pen"></i> Create Post</h3>
                <textarea id="postContent" placeholder="What's on your mind?"></textarea>
                <input id="postImage" placeholder="🖼️ Image URL (optional)">
                <button id="createPostBtn"><i class="fas fa-paper-plane"></i> Post</button>

                <h3><i class="fas fa-stream"></i> Feed</h3>
                <div class="feed-toggle">
                    <button id="feedAllBtn" class="active"><i class="fas fa-globe"></i> All</button>
                    <button id="feedFollowingBtn"><i class="fas fa-user-friends"></i> Following</button>
                </div>
                <div id="postsList"></div>
            </div>

            <!-- Campaigns Tab -->
            <div id="campaignsTab" class="tab-content hidden">
                <h3><i class="fas fa-hand-holding-usd"></i> Start a Campaign</h3>
                <input id="campaignTitle" placeholder="Campaign Title">
                <textarea id="campaignDescription" placeholder="Describe your campaign..."></textarea>
                <input id="campaignGoal" type="number" placeholder="Goal (FUND)">
                <input id="campaignDeadline" type="date" placeholder="Deadline">
                <button id="createCampaignBtn"><i class="fas fa-rocket"></i> Launch</button>

                <h3><i class="fas fa-fire"></i> Active Campaigns</h3>
                <div id="campaignsList"></div>
            </div>

            <!-- Admin Tab -->
            <div id="adminTab" class="tab-content hidden">
                <h3><i class="fas fa-tasks"></i> Manage Posts</h3>
                <div id="adminPostsList"></div>
                <h3><i class="fas fa-tasks"></i> Manage Campaigns</h3>
                <div id="adminCampaignsList"></div>
            </div>
        </div>
        <div class="footer-note"><i class="far fa-copyright"></i> 2026 Social Funders Network – powered by FUND on Base</div>
    </div>

    <!-- Ethers -->
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>

    <script>
        // ================== CONFIGURATION ==================
        const FUND_ADDRESS = '0x06396aa215ef3fa2945c535be9c2ddc4e80a9b07';
        const FUND_ABI = [
            'function transfer(address to, uint256 amount) returns (bool)',
            'function decimals() view returns (uint8)',
            'function balanceOf(address account) view returns (uint256)'
        ];
        const ADMIN_WALLETS = ['0x8F1BE8D1331f6968680bC141339bb246f68aD899'];

        // Global state
        let provider, signer, fundContract, userAddress, isAdmin = false;
        let posts = [], campaigns = [], following = [];

        // ================== LOCAL STORAGE ==================
        function loadData() {
            const savedPosts = localStorage.getItem('sfn_posts');
            const savedCampaigns = localStorage.getItem('sfn_campaigns');
            const savedFollowing = localStorage.getItem('sfn_following');
            posts = savedPosts ? JSON.parse(savedPosts) : [];
            campaigns = savedCampaigns ? JSON.parse(savedCampaigns) : [];
            following = savedFollowing ? JSON.parse(savedFollowing) : [];
        }
        function saveData() {
            localStorage.setItem('sfn_posts', JSON.stringify(posts));
            localStorage.setItem('sfn_campaigns', JSON.stringify(campaigns));
            localStorage.setItem('sfn_following', JSON.stringify(following));
        }
        loadData();

        // DOM elements
        const connectBtn = document.getElementById('connectBtn');
        const walletInfo = document.getElementById('walletInfo');
        const appDiv = document.getElementById('app');
        const tabs = document.querySelectorAll('.tab');
        const adminTab = document.getElementById('adminTab');
        const feedAllBtn = document.getElementById('feedAllBtn');
        const feedFollowingBtn = document.getElementById('feedFollowingBtn');
        let currentFeed = 'all';

        // ================== WALLET CONNECTION ==================
        connectBtn.addEventListener('click', async () => {
            if (!window.ethereum) {
                alert('❌ No wallet detected. Please open in Trust Wallet (Browser) or MetaMask.');
                return;
            }
            try {
                await window.ethereum.request({ method: 'eth_requestAccounts' });
                provider = new ethers.providers.Web3Provider(window.ethereum);
                signer = provider.getSigner();
                userAddress = await signer.getAddress();

                const network = await provider.getNetwork();
                if (network.chainId !== 8453) {
                    alert('⚠️ Please switch to Base network (Chain ID 8453).');
                    return;
                }

                fundContract = new ethers.Contract(FUND_ADDRESS, FUND_ABI, signer);
                const decimals = await fundContract.decimals();
                const balance = await fundContract.balanceOf(userAddress);
                const formattedBalance = ethers.utils.formatUnits(balance, decimals);

                walletInfo.innerHTML = `
                    <i class="fas fa-check-circle"></i> <strong>Connected:</strong> ${userAddress}<br>
                    <i class="fas fa-coins"></i> <strong>FUND Balance:</strong> ${parseFloat(formattedBalance).toFixed(2)} FUND
                `;
                walletInfo.classList.remove('hidden');
                connectBtn.style.display = 'none';
                appDiv.classList.remove('hidden');

                isAdmin = ADMIN_WALLETS.includes(userAddress.toLowerCase());
                if (!isAdmin) adminTab.style.display = 'none';

                renderFeed();
                renderCampaigns();
                if (isAdmin) renderAdminPanels();
            } catch (err) {
                alert('Connection error: ' + err.message);
            }
        });

        // ================== TAB SWITCHING ==================
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                const tabName = tab.dataset.tab;
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
                document.getElementById(tabName + 'Tab').classList.remove('hidden');
                if (tabName === 'admin' && isAdmin) renderAdminPanels();
                if (tabName === 'feed') renderFeed();
            });
        });

        // ================== FEED TOGGLE ==================
        feedAllBtn.addEventListener('click', () => {
            currentFeed = 'all';
            feedAllBtn.classList.add('active');
            feedFollowingBtn.classList.remove('active');
            renderFeed();
        });
        feedFollowingBtn.addEventListener('click', () => {
            currentFeed = 'following';
            feedFollowingBtn.classList.add('active');
            feedAllBtn.classList.remove('active');
            renderFeed();
        });

        // ================== FOLLOW FUNCTIONS ==================
        function toggleFollow(author) {
            if (!userAddress) return alert('Connect wallet first');
            if (author === userAddress) return alert('You cannot follow yourself');
            const index = following.indexOf(author);
            if (index === -1) following.push(author);
            else following.splice(index, 1);
            saveData();
            renderFeed();
        }

        function isFollowing(author) {
            return following.includes(author);
        }

        // ================== FEED RENDER ==================
        function renderFeed() {
            const postsList = document.getElementById('postsList');
            let filteredPosts = posts.slice().reverse();
            if (currentFeed === 'following')
                filteredPosts = filteredPosts.filter(post => following.includes(post.author));

            if (filteredPosts.length === 0) {
                postsList.innerHTML = '<p style="text-align:center; color:#666;"><i class="fas fa-inbox"></i> No posts to show.</p>';
                return;
            }

            postsList.innerHTML = filteredPosts.map(post => {
                const followBtnText = isFollowing(post.author) ? '<i class="fas fa-user-check"></i> Following' : '<i class="fas fa-user-plus"></i> Follow';
                const followBtnDisabled = (post.author === userAddress) ? 'disabled' : '';
                return `
                <div class="card" data-post-id="${post.id}">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <div><i class="fas fa-user-circle"></i> <strong>${post.username || post.author.slice(0,6)+'...'+post.author.slice(-4)}</strong></div>
                        ${userAddress && post.author !== userAddress ? `<button class="follow-btn" data-author="${post.author}" ${followBtnDisabled}>${followBtnText}</button>` : ''}
                    </div>
                    <p>${post.content}</p>
                    ${post.imageUrl ? `<img src="${post.imageUrl}" alt="post image" onerror="this.style.display='none'">` : ''}
                    <div class="post-actions">
                        <button class="like-btn" data-id="${post.id}"><i class="fas fa-heart"></i> ${post.likes ? post.likes.length : 0}</button>
                        <button class="comment-toggle" data-id="${post.id}"><i class="fas fa-comment"></i> Comments</button>
                        <button class="tip-btn" data-recipient="${post.author}"><i class="fas fa-hand-holding-heart"></i> Tip</button>
                        <button class="share-btn share-button" data-title="Check out this post!" data-text="${post.content.substring(0,50)}" data-url="${window.location.origin}/posts/${post.id}"><i class="fas fa-share-alt"></i> Share</button>
                    </div>
                    <div class="comments-section hidden" id="comments-${post.id}">
                        ${(post.comments || []).map(c => `
                            <div class="comment"><i class="fas fa-user-circle"></i> <strong>${c.username || c.userWallet.slice(0,6)}:</strong> ${c.content}</div>
                        `).join('')}
                        <div style="margin-top:10px; display: flex; gap: 5px;">
                            <input type="text" placeholder="Add a comment..." id="comment-input-${post.id}" style="flex:1;">
                            <button class="add-comment" data-id="${post.id}"><i class="fas fa-paper-plane"></i></button>
                        </div>
                    </div>
                </div>
            `}).join('');

            // Attach listeners
            document.querySelectorAll('.like-btn').forEach(btn => btn.addEventListener('click', () => likePost(btn.dataset.id)));
            document.querySelectorAll('.comment-toggle').forEach(btn => btn.addEventListener('click', () => toggleComments(btn.dataset.id)));
            document.querySelectorAll('.add-comment').forEach(btn => btn.addEventListener('click', () => addComment(btn.dataset.id)));
            document.querySelectorAll('.tip-btn').forEach(btn => btn.addEventListener('click', () => sendTip(btn.dataset.recipient)));
            document.querySelectorAll('.share-btn').forEach(btn => btn.addEventListener('click', (e) => shareContent(e.target.dataset)));
            document.querySelectorAll('.follow-btn').forEach(btn => btn.addEventListener('click', (e) => toggleFollow(e.target.dataset.author)));
        }

        function likePost(postId) {
            if (!userAddress) return alert('Connect wallet first');
            const post = posts.find(p => p.id == postId);
            if (!post) return;
            if (!post.likes) post.likes = [];
            const index = post.likes.indexOf(userAddress);
            if (index === -1) post.likes.push(userAddress); else post.likes.splice(index, 1);
            saveData(); renderFeed();
        }

        function toggleComments(postId) {
            document.getElementById('comments-' + postId).classList.toggle('hidden');
        }

        function addComment(postId) {
            if (!userAddress) return alert('Connect wallet first');
            const input = document.getElementById('comment-input-' + postId);
            const text = input.value.trim();
            if (!text) return;
            const post = posts.find(p => p.id == postId);
            if (!post) return;
            if (!post.comments) post.comments = [];
            post.comments.push({ userWallet: userAddress, username: userAddress.slice(0,6)+'...'+userAddress.slice(-4), content: text, timestamp: Date.now() });
            saveData(); renderFeed();
        }

        document.getElementById('createPostBtn').addEventListener('click', () => {
            if (!userAddress) return alert('Connect wallet first');
            const content = document.getElementById('postContent').value.trim();
            if (!content) return alert('Post content cannot be empty');
            const imageUrl = document.getElementById('postImage').value.trim();
            posts.push({ id: Date.now(), author: userAddress, username: userAddress.slice(0,6)+'...'+userAddress.slice(-4), content, imageUrl, likes: [], comments: [], timestamp: Date.now() });
            saveData();
            document.getElementById('postContent').value = '';
            document.getElementById('postImage').value = '';
            renderFeed();
        });

        // ================== CAMPAIGNS ==================
        function renderCampaigns() {
            const campaignsList = document.getElementById('campaignsList');
            if (campaigns.length === 0) {
                campaignsList.innerHTML = '<p style="text-align:center; color:#666;"><i class="fas fa-info-circle"></i> No active campaigns.</p>';
                return;
            }
            campaignsList.innerHTML = campaigns.filter(c => c.status === 'active').map(camp => `
                <div class="card">
                    <h4><i class="fas fa-bullseye"></i> ${camp.title}</h4>
                    <p>${camp.description}</p>
                    <p><strong>Goal:</strong> ${camp.goal} FUND</p>
                    <p><strong>Raised:</strong> ${camp.raised || 0} FUND</p>
                    <div class="progress"><div class="progress-bar" style="width:${Math.min(100, ((camp.raised||0)/camp.goal)*100)}%"></div></div>
                    <p><strong>Deadline:</strong> ${camp.deadline}</p>
                    <div class="post-actions">
                        <button class="donate-btn" data-creator="${camp.creator}" data-id="${camp.id}"><i class="fas fa-donate"></i> Donate</button>
                        <button class="share-btn share-button" data-title="Support this campaign!" data-text="${camp.title}" data-url="${window.location.origin}/campaigns/${camp.id}"><i class="fas fa-share-alt"></i> Share</button>
                    </div>
                </div>
            `).join('');
            document.querySelectorAll('.donate-btn').forEach(btn => btn.addEventListener('click', () => donate(btn.dataset.creator, btn.dataset.id)));
            document.querySelectorAll('.share-btn').forEach(btn => btn.addEventListener('click', (e) => shareContent(e.target.dataset)));
        }

        document.getElementById('createCampaignBtn').addEventListener('click', () => {
            if (!userAddress) return alert('Connect wallet first');
            const title = document.getElementById('campaignTitle').value.trim();
            const desc = document.getElementById('campaignDescription').value.trim();
            const goal = parseFloat(document.getElementById('campaignGoal').value);
            const deadline = document.getElementById('campaignDeadline').value;
            if (!title || !desc || !goal || !deadline) return alert('Please fill all fields');
            campaigns.push({ id: Date.now(), creator: userAddress, title, description: desc, goal, raised: 0, deadline, status: 'active', timestamp: Date.now() });
            saveData();
            document.getElementById('campaignTitle').value = '';
            document.getElementById('campaignDescription').value = '';
            document.getElementById('campaignGoal').value = '';
            document.getElementById('campaignDeadline').value = '';
            renderCampaigns();
        });

        async function donate(creator, campaignId) {
            if (!userAddress) return alert('Connect wallet first');
            const amount = prompt('Enter amount to donate (FUND):');
            if (!amount || isNaN(amount) || amount <= 0) return;
            try {
                const decimals = await fundContract.decimals();
                const amountWei = ethers.utils.parseUnits(amount, decimals);
                const tx = await fundContract.transfer(creator, amountWei);
                alert(`✅ Donation sent! Tx: ${tx.hash}`);
                await tx.wait();
                const campaign = campaigns.find(c => c.id == campaignId);
                if (campaign) { campaign.raised = (campaign.raised || 0) + parseFloat(amount); saveData(); renderCampaigns(); }
                alert('🎉 Transaction confirmed!');
            } catch (err) { alert('❌ Donation failed: ' + err.message); }
        }

        async function sendTip(recipient) {
            if (!userAddress) return alert('Connect wallet first');
            const amount = prompt('Enter amount to tip (FUND):');
            if (!amount || isNaN(amount) || amount <= 0) return;
            try {
                const decimals = await fundContract.decimals();
                const amountWei = ethers.utils.parseUnits(amount, decimals);
                const tx = await fundContract.transfer(recipient, amountWei);
                alert(`💸 Tip sent! Tx: ${tx.hash}`);
                await tx.wait();
                alert('✅ Transaction confirmed!');
            } catch (err) { alert('❌ Tip failed: ' + err.message); }
        }

        function shareContent(data) {
            const shareData = { title: data.title || 'Social Funders Network', text: data.text || '', url: data.url || window.location.href };
            if (navigator.share) navigator.share(shareData).catch(() => copyToClipboard(shareData.url));
            else copyToClipboard(shareData.url);
        }
        function copyToClipboard(text) { navigator.clipboard.writeText(text).then(() => alert('🔗 Link copied!')); }

        function renderAdminPanels() {
            if (!isAdmin) return;
            const adminPosts = document.getElementById('adminPostsList');
            adminPosts.innerHTML = posts.length ? posts.map(p => `<div class="card"><p><strong>${p.author}</strong>: ${p.content}</p><button class="danger" data-action="deletePost" data-id="${p.id}"><i class="fas fa-trash"></i> Delete</button></div>`).join('') : '<p>No posts.</p>';
            document.querySelectorAll('[data-action="deletePost"]').forEach(btn => btn.addEventListener('click', () => deletePost(btn.dataset.id)));

            const adminCampaigns = document.getElementById('adminCampaignsList');
            adminCampaigns.innerHTML = campaigns.length ? campaigns.map(c => `<div class="card"><h4>${c.title}</h4><p>By: ${c.creator}</p><button class="danger" data-action="deleteCampaign" data-id="${c.id}"><i class="fas fa-trash"></i> Delete</button></div>`).join('') : '<p>No campaigns.</p>';
            document.querySelectorAll('[data-action="deleteCampaign"]').forEach(btn => btn.addEventListener('click', () => deleteCampaign(btn.dataset.id)));
        }

        function deletePost(postId) { if (!isAdmin) return; posts = posts.filter(p => p.id != postId); saveData(); renderFeed(); if (isAdmin) renderAdminPanels(); }
        function deleteCampaign(campaignId) { if (!isAdmin) return; campaigns = campaigns.filter(c => c.id != campaignId); saveData(); renderCampaigns(); if (isAdmin) renderAdminPanels(); }
    </script>
</body>
</html>
