<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Funders Network – Debug</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f5f5;
        }
        h1 { color: #333; }
        button {
            padding: 12px 20px;
            font-size: 16px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        #walletInfo {
            margin: 20px 0;
            padding: 15px;
            background: #e3f2fd;
            border-radius: 5px;
            word-break: break-all;
        }
        #debug {
            margin-top: 30px;
            padding: 15px;
            background: #f0f0f0;
            border: 1px solid #ccc;
            border-radius: 5px;
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <h1>Social Funders Network – Debug</h1>
    <button id="connectBtn">Connect Wallet</button>
    <div id="walletInfo"></div>
    <div id="debug">Loading...</div>

    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <script>
        const debugDiv = document.getElementById('debug');
        const walletInfo = document.getElementById('walletInfo');
        const connectBtn = document.getElementById('connectBtn');

        function log(message) {
            console.log(message);
            debugDiv.innerHTML += new Date().toLocaleTimeString() + ': ' + message + '\n';
        }

        log('Page loaded – waiting for connect click');

        connectBtn.addEventListener('click', async () => {
            log('Connect button clicked');
            
            // Check if ethereum provider exists
            if (typeof window.ethereum === 'undefined') {
                log('❌ window.ethereum is undefined – no wallet detected');
                walletInfo.innerHTML = '❌ No wallet detected. Please open in Trust Wallet browser.';
                return;
            }
            log('✅ window.ethereum exists');

            try {
                // Request accounts
                log('Requesting accounts...');
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                log('Accounts received: ' + accounts.join(', '));
                
                // Create provider
                const provider = new ethers.providers.Web3Provider(window.ethereum);
                const signer = provider.getSigner();
                const address = await signer.getAddress();
                log('Signer address: ' + address);

                // Check network
                const network = await provider.getNetwork();
                log('Network chainId: ' + network.chainId);
                
                if (network.chainId !== 8453) {
                    log('⚠️ Wrong network – expected 8453 (Base)');
                    walletInfo.innerHTML = '⚠️ Please switch to Base network (Chain ID 8453).';
                    return;
                }

                // Success
                log('✅ Wallet connected successfully on Base');
                walletInfo.innerHTML = '✅ Connected: ' + address;
                
            } catch (error) {
                log('❌ Error: ' + error.message);
                walletInfo.innerHTML = '❌ Connection error: ' + error.message;
            }
        });
    </script>
</body>
</html>
