<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Funders Network</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        h1 { text-align: center; color: #333; margin-bottom: 20px; }
        button {
            padding: 10px 15px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: #4CAF50;
            color: white;
            margin: 5px;
        }
        button.secondary { background: #2196F3; }
        button.danger { background: #f44336; }
        button.follow-btn { background: #ff9800; }
        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .card {
            background: #f9f9f9;
            border: 1px solid #eee;
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
        }
        .hidden { display: none; }
        .tabs {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .tab {
            padding: 8px 16px;
            background: #ddd;
            border-radius: 20px;
            cursor: pointer;
        }
        .tab.active { background: #4CAF50; color: white; }
        .wallet-info {
            background: #e3f2fd;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            word-break: break-all;
        }
        .post-actions { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 10px; }
        .comment { margin-left: 20px; padding: 5px; border-left: 2px solid #4CAF50; margin-top: 5px; }
        .progress { width: 100%; height: 20px; background: #eee; border-radius: 10px; overflow: hidden; }
        .progress-bar { height: 100%; background: #4CAF50; width: 0%; }
        .feed-toggle {
            display: flex;
            gap: 10px;
            margin: 15px 0;
        }
        .feed-toggle button {
            flex: 1;
            background: #e0e0e0;
            color: #333;
        }
        .feed-toggle button.active { background: #4CAF50; color: white; }
        .error-box {
            background: #ffeb3b;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            white-space: pre-wrap;
            font-size: 12px;
            color: #333;
        }
        .footer { text-align: center; color: #666; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Social Funders Network</h1>

        <div class="error-box" id="errorBox"></div>

        <div id="walletSection">
            <button id="connectBtn">Connect Wallet</button>
            <div id="walletInfo" class="wallet-info hidden"></div>
        </div>

        <div id="app" class="hidden">
            <div class="tabs">
                <div class="tab active" data-tab="feed">Feed</div>
                <div class="tab" data-tab="swap">Swap</div>
                <div class="tab" data-tab="campaigns">Campaigns</div>
                <div class="tab" data-tab="admin" id="adminTab">Admin</div>
            </div>

            <!-- Feed Tab -->
            <div id="feedTab" class="tab-content">
                <h3>Create Post</h3>
                <textarea id="postContent" placeholder="What's on your mind?"></textarea>
                <input id="postImage" placeholder="Image URL (optional)">
                <button id="createPostBtn">Post</button>

                <h3>Feed</h3>
                <div class="feed-toggle">
                    <button id="feedAllBtn" class="active">🌐 All</button>
                    <button id="feedFollowingBtn">👥 Following</button>
                </div>
                <div id="postsList"></div>
            </div>

            <!-- Swap Tab -->
            <div id="swapTab" class="tab-content hidden">
                <h3>Get FUND Tokens</h3>
                <select id="fromToken">
                    <option value="ETH">ETH</option>
                    <option value="USDC">USDC</option>
                </select>
                <input type="number" id="fromAmount" placeholder="Amount">
                <button id="swapRedirectBtn">Swap on Uniswap</button>
                <div id="swapStatus"></div>
                <p style="margin-top:10px; font-size:0.9rem;">You'll be redirected to Uniswap.</p>
            </div>

            <!-- Campaigns Tab -->
            <div id="campaignsTab" class="tab-content hidden">
                <h3>Start a Campaign</h3>
                <input id="campaignTitle" placeholder="Title">
                <textarea id="campaignDescription" placeholder="Description"></textarea>
                <input id="campaignGoal" type="number" placeholder="Goal (FUND)">
                <input id="campaignDeadline" type="date" placeholder="Deadline">
                <button id="createCampaignBtn">Create</button>
                <h3>Active Campaigns</h3>
                <div id="campaignsList"></div>
            </div>

            <!-- Admin Tab -->
            <div id="adminTab" class="tab-content hidden">
                <h3>Manage Posts</h3>
                <div id="adminPostsList"></div>
                <h3>Manage Campaigns</h3>
                <div id="adminCampaignsList"></div>
            </div>
        </div>

        <div class="footer">Powered by FUND on Base</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <script>
        (function() {
            // Error display
            const errorBox = document.getElementById('errorBox');
            function logError(msg) { console.error(msg); if (errorBox) errorBox.innerHTML += msg + '<br>'; }

            try {
                // === CONFIG ===
                const FUND_ADDRESS = '0x06396aa215ef3fa2945c535be9c2ddc4e80a9b07';
                const USDC_ADDRESS = '0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913';
                const ADMIN_WALLETS = ['0x8F1BE8D1331f6968680bC141339bb246f68aD899'];

                // === STATE ===
                let provider, signer, fundContract, userAddress, isAdmin = false;
                let posts = [], campaigns = [], following = [], tips = []; // tips: [{ tipper, recipient, amount, tx }]

                // === DOM ELEMENTS ===
                const connectBtn = document.getElementById('connectBtn');
                const walletInfo = document.getElementById('walletInfo');
                const appDiv = document.getElementById('app');
                const tabs = document.querySelectorAll('.tab');
                const adminTab = document.getElementById('adminTab');
                const createPostBtn = document.getElementById('createPostBtn');
                const postContent = document.getElementById('postContent');
                const postImage = document.getElementById('postImage');
                const fromAmount = document.getElementById('fromAmount');
                const fromToken = document.getElementById('fromToken');
                const swapRedirectBtn = document.getElementById('swapRedirectBtn');
                const swapStatus = document.getElementById('swapStatus');
                const createCampaignBtn = document.getElementById('createCampaignBtn');
                const campaignTitle = document.getElementById('campaignTitle');
                const campaignDescription = document.getElementById('campaignDescription');
                const campaignGoal = document.getElementById('campaignGoal');
                const campaignDeadline = document.getElementById('campaignDeadline');
                const feedAllBtn = document.getElementById('feedAllBtn');
                const feedFollowingBtn = document.getElementById('feedFollowingBtn');
                let currentFeed = 'all';

                // === LOCAL STORAGE ===
                function loadData() {
                    try {
                        posts = JSON.parse(localStorage.getItem('posts') || '[]');
                        campaigns = JSON.parse(localStorage.getItem('campaigns') || '[]');
                        following = JSON.parse(localStorage.getItem('following') || '[]');
                        tips = JSON.parse(localStorage.getItem('tips') || '[]');
                    } catch (e) { logError('Storage error: ' + e.message); }
                }
                function saveData() {
                    localStorage.setItem('posts', JSON.stringify(posts));
                    localStorage.setItem('campaigns', JSON.stringify(campaigns));
                    localStorage.setItem('following', JSON.stringify(following));
                    localStorage.setItem('tips', JSON.stringify(tips));
                }
                loadData();

                // === WALLET CONNECTION ===
                connectBtn.addEventListener('click', async () => {
                    try {
                        if (!window.ethereum) {
                            alert('No wallet detected. Open in Trust Wallet browser.');
                            return;
                        }
                        const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                        userAddress = accounts[0];
                        provider = new ethers.providers.Web3Provider(window.ethereum);
                        signer = provider.getSigner();

                        const network = await provider.getNetwork();
                        if (network.chainId !== 8453) {
                            alert('Please switch to Base network (Chain ID 8453).');
                            return;
                        }

                        fundContract = new ethers.Contract(FUND_ADDRESS, [
                            'function balanceOf(address) view returns (uint256)',
                            'function decimals() view returns (uint8)'
                        ], provider);
                        const decimals = await fundContract.decimals();
                        const balance = await fundContract.balanceOf(userAddress);
                        const formatted = ethers.utils.formatUnits(balance, decimals);

                        walletInfo.innerHTML = `✅ Connected: ${userAddress}<br>💰 FUND Balance: ${parseFloat(formatted).toFixed(2)}`;
                        walletInfo.classList.remove('hidden');
                        connectBtn.style.display = 'none';
                        appDiv.classList.remove('hidden');

                        isAdmin = ADMIN_WALLETS.includes(userAddress.toLowerCase());
                        if (!isAdmin) adminTab.style.display = 'none';

                        renderFeed();
                        renderCampaigns();
                        if (isAdmin) renderAdminPanels();
                    } catch (err) { logError('Connection error: ' + err.message); alert('Connection failed: ' + err.message); }
                });

                // === TAB SWITCHING ===
                tabs.forEach(tab => {
                    tab.addEventListener('click', () => {
                        const tabName = tab.dataset.tab;
                        tabs.forEach(t => t.classList.remove('active'));
                        tab.classList.add('active');
                        document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
                        document.getElementById(tabName + 'Tab').classList.remove('hidden');
                        if (tabName === 'feed') renderFeed();
                        if (tabName === 'campaigns') renderCampaigns();
                        if (tabName === 'admin' && isAdmin) renderAdminPanels();
                    });
                });

                // === FEED TOGGLE ===
                feedAllBtn.addEventListener('click', () => {
                    currentFeed = 'all';
                    feedAllBtn.classList.add('active');
                    feedFollowingBtn.classList.remove('active');
                    renderFeed();
                });
                feedFollowingBtn.addEventListener('click', () => {
                    currentFeed = 'following';
                    feedFollowingBtn.classList.add('active');
                    feedAllBtn.classList.remove('active');
                    renderFeed();
                });

                // === FOLLOW / UNFOLLOW (requires tip) ===
                function hasTipped(tipper, recipient) {
                    return tips.some(t => t.tipper === tipper && t.recipient === recipient);
                }

                function toggleFollow(author) {
                    if (!userAddress) return alert('Connect first');
                    if (author === userAddress) return alert('Cannot follow yourself');
                    // Check if user has tipped this author
                    if (!hasTipped(userAddress, author)) {
                        alert('You must tip this user first before following.');
                        return;
                    }
                    const idx = following.indexOf(author);
                    if (idx === -1) following.push(author);
                    else following.splice(idx, 1);
                    saveData();
                    renderFeed(); // refresh follow buttons
                }

                function isFollowing(author) {
                    return following.includes(author);
                }

                // === TIPPING (record tip) ===
                async function sendTip(recipient) {
                    if (!userAddress || !signer) return alert('Connect first');
                    const amount = prompt('Enter FUND amount to tip:');
                    if (!amount || amount <= 0) return;
                    try {
                        const contract = new ethers.Contract(FUND_ADDRESS, [
                            'function transfer(address to, uint256 amount) returns (bool)'
                        ], signer);
                        const decimals = await fundContract.decimals();
                        const tx = await contract.transfer(recipient, ethers.utils.parseUnits(amount, decimals));
                        alert(`Tip sent! Tx: ${tx.hash}`);
                        await tx.wait();
                        alert('Transaction confirmed!');
                        // Record tip
                        tips.push({ tipper: userAddress, recipient, amount: parseFloat(amount), tx: tx.hash });
                        saveData();
                        // Refresh balance
                        const balance = await fundContract.balanceOf(userAddress);
                        const formatted = ethers.utils.formatUnits(balance, decimals);
                        walletInfo.innerHTML = walletInfo.innerHTML.replace(/FUND Balance: [\d.]+/, `FUND Balance: ${parseFloat(formatted).toFixed(2)}`);
                        renderFeed(); // update follow buttons (now tipped)
                    } catch (err) { alert('Error: ' + err.message); }
                }

                // === FEED RENDER ===
                function renderFeed() {
                    const postsList = document.getElementById('postsList');
                    if (!postsList) return;

                    let filteredPosts = posts.slice().reverse();
                    if (currentFeed === 'following') {
                        filteredPosts = filteredPosts.filter(p => following.includes(p.author));
                    }

                    if (filteredPosts.length === 0) {
                        postsList.innerHTML = '<p>No posts to show.</p>';
                        return;
                    }

                    postsList.innerHTML = filteredPosts.map(post => {
                        const hasTippedAuthor = userAddress ? hasTipped(userAddress, post.author) : false;
                        const followBtnText = isFollowing(post.author) ? '✅ Following' : '➕ Follow';
                        const followDisabled = (!hasTippedAuthor && !isFollowing(post.author)) ? '' : ''; // enable if already following or just tipped
                        // Actually we want follow button enabled only if user has tipped and not following, or if following (to unfollow)
                        let followButton = '';
                        if (userAddress && post.author !== userAddress) {
                            if (hasTippedAuthor) {
                                followButton = `<button class="follow-btn" data-author="${post.author}">${followBtnText}</button>`;
                            } else {
                                followButton = `<button disabled style="opacity:0.5;" title="Tip this user first to follow">🔒 Follow (tip required)</button>`;
                            }
                        }

                        return `
                            <div class="card">
                                <div style="display:flex; justify-content:space-between;">
                                    <strong>${post.username || post.author.slice(0,6)}</strong>
                                    ${followButton}
                                </div>
                                <p>${post.content}</p>
                                ${post.imageUrl ? `<img src="${post.imageUrl}" style="max-width:100%">` : ''}
                                <div class="post-actions">
                                    <button class="like-btn" data-id="${post.id}">❤️ ${post.likes ? post.likes.length : 0}</button>
                                    <button class="comment-toggle" data-id="${post.id}">💬 Comments</button>
                                    <button class="tip-btn" data-recipient="${post.author}">💸 Tip</button>
                                </div>
                                <div class="comments-section hidden" id="comments-${post.id}">
                                    ${(post.comments || []).map(c => `<div class="comment"><strong>${c.username || c.userWallet.slice(0,6)}:</strong> ${c.content}</div>`).join('')}
                                    <div style="margin-top:10px; display:flex; gap:5px;">
                                        <input type="text" id="comment-input-${post.id}" placeholder="Add comment...">
                                        <button class="add-comment" data-id="${post.id}">Post</button>
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('');

                    // Attach event listeners
                    document.querySelectorAll('.like-btn').forEach(btn => btn.addEventListener('click', (e) => likePost(e.target.dataset.id)));
                    document.querySelectorAll('.comment-toggle').forEach(btn => btn.addEventListener('click', (e) => toggleComments(e.target.dataset.id)));
                    document.querySelectorAll('.add-comment').forEach(btn => btn.addEventListener('click', (e) => addComment(e.target.dataset.id)));
                    document.querySelectorAll('.tip-btn').forEach(btn => btn.addEventListener('click', (e) => sendTip(e.target.dataset.recipient)));
                    document.querySelectorAll('.follow-btn').forEach(btn => btn.addEventListener('click', (e) => toggleFollow(e.target.dataset.author)));
                }

                function likePost(postId) {
                    if (!userAddress) return alert('Connect first');
                    const post = posts.find(p => p.id == postId);
                    if (!post) return;
                    if (!post.likes) post.likes = [];
                    const idx = post.likes.indexOf(userAddress);
                    if (idx === -1) post.likes.push(userAddress); else post.likes.splice(idx, 1);
                    saveData(); renderFeed();
                }

                function toggleComments(postId) {
                    const section = document.getElementById('comments-' + postId);
                    if (section) section.classList.toggle('hidden');
                }

                function addComment(postId) {
                    if (!userAddress) return alert('Connect first');
                    const input = document.getElementById('comment-input-' + postId);
                    const text = input.value.trim();
                    if (!text) return;
                    const post = posts.find(p => p.id == postId);
                    if (!post) return;
                    if (!post.comments) post.comments = [];
                    post.comments.push({ userWallet: userAddress, username: userAddress.slice(0,6)+'...', content: text });
                    saveData(); renderFeed();
                }

                // === CREATE POST ===
                if (createPostBtn) {
                    createPostBtn.addEventListener('click', () => {
                        if (!userAddress) return alert('Connect first');
                        const content = postContent.value.trim();
                        if (!content) return alert('Content empty');
                        const img = postImage.value.trim();
                        posts.push({
                            id: Date.now(),
                            author: userAddress,
                            username: userAddress.slice(0,6)+'...',
                            content,
                            imageUrl: img,
                            likes: [],
                            comments: []
                        });
                        saveData();
                        postContent.value = '';
                        postImage.value = '';
                        renderFeed();
                    });
                }

                // === CAMPAIGNS ===
                function renderCampaigns() {
                    const list = document.getElementById('campaignsList');
                    if (!list) return;
                    if (!campaigns.length) {
                        list.innerHTML = '<p>No active campaigns.</p>';
                        return;
                    }
                    list.innerHTML = campaigns.filter(c => c.status === 'active').map(c => `
                        <div class="card">
                            <h4>${c.title}</h4>
                            <p>${c.description}</p>
                            <p>Goal: ${c.goal} FUND</p>
                            <p>Raised: ${c.raised || 0} FUND</p>
                            <div class="progress"><div class="progress-bar" style="width:${Math.min(100, ((c.raised||0)/c.goal)*100)}%"></div></div>
                            <p>Deadline: ${c.deadline}</p>
                            <button class="donate-btn" data-creator="${c.creator}" data-id="${c.id}">Donate</button>
                        </div>
                    `).join('');
                    document.querySelectorAll('.donate-btn').forEach(btn => btn.addEventListener('click', (e) => donate(e.target.dataset.creator, e.target.dataset.id)));
                }

                if (createCampaignBtn) {
                    createCampaignBtn.addEventListener('click', () => {
                        if (!userAddress) return alert('Connect first');
                        const title = campaignTitle.value.trim();
                        const desc = campaignDescription.value.trim();
                        const goal = parseFloat(campaignGoal.value);
                        const deadline = campaignDeadline.value;
                        if (!title || !desc || !goal || !deadline) return alert('Fill all fields');
                        campaigns.push({
                            id: Date.now(),
                            creator: userAddress,
                            title,
                            description: desc,
                            goal,
                            raised: 0,
                            deadline,
                            status: 'active'
                        });
                        saveData();
                        campaignTitle.value = '';
                        campaignDescription.value = '';
                        campaignGoal.value = '';
                        campaignDeadline.value = '';
                        renderCampaigns();
                    });
                }

                async function donate(creator, campaignId) {
                    if (!userAddress || !signer) return alert('Connect first');
                    const amount = prompt('Enter FUND amount to donate:');
                    if (!amount || amount <= 0) return;
                    try {
                        const contract = new ethers.Contract(FUND_ADDRESS, [
                            'function transfer(address to, uint256 amount) returns (bool)'
                        ], signer);
                        const decimals = await fundContract.decimals();
                        const tx = await contract.transfer(creator, ethers.utils.parseUnits(amount, decimals));
                        alert(`Donation sent! Tx: ${tx.hash}`);
                        await tx.wait();
                        const camp = campaigns.find(c => c.id == campaignId);
                        if (camp) {
                            camp.raised = (camp.raised || 0) + parseFloat(amount);
                            saveData();
                            renderCampaigns();
                        }
                        alert('Confirmed');
                    } catch (err) { alert('Error: ' + err.message); }
                }

                // === ADMIN ===
                function renderAdminPanels() {
                    if (!isAdmin) return;
                    const adminPosts = document.getElementById('adminPostsList');
                    const adminCampaigns = document.getElementById('adminCampaignsList');
                    if (adminPosts) {
                        adminPosts.innerHTML = posts.map(p => `<div class="card">${p.content} <button class="danger" data-id="${p.id}" data-action="deletePost">Delete</button></div>`).join('');
                        document.querySelectorAll('[data-action="deletePost"]').forEach(btn => btn.addEventListener('click', (e) => deletePost(e.target.dataset.id)));
                    }
                    if (adminCampaigns) {
                        adminCampaigns.innerHTML = campaigns.map(c => `<div class="card">${c.title} <button class="danger" data-id="${c.id}" data-action="deleteCampaign">Delete</button></div>`).join('');
                        document.querySelectorAll('[data-action="deleteCampaign"]').forEach(btn => btn.addEventListener('click', (e) => deleteCampaign(e.target.dataset.id)));
                    }
                }

                function deletePost(postId) {
                    posts = posts.filter(p => p.id != postId);
                    saveData();
                    renderFeed();
                    if (isAdmin) renderAdminPanels();
                }
                function deleteCampaign(campaignId) {
                    campaigns = campaigns.filter(c => c.id != campaignId);
                    saveData();
                    renderCampaigns();
                    if (isAdmin) renderAdminPanels();
                }

                // === SWAP REDIRECT ===
                if (swapRedirectBtn) {
                    swapRedirectBtn.addEventListener('click', () => {
                        if (!userAddress) {
                            swapStatus.innerHTML = '❌ Connect wallet first';
                            return;
                        }
                        const amount = fromAmount.value;
                        const from = fromToken.value;
                        if (!amount || parseFloat(amount) <= 0) {
                            swapStatus.innerHTML = '❌ Enter a valid amount';
                            return;
                        }
                        let url = 'https://app.uniswap.org/#/swap?chain=base&outputCurrency=' + FUND_ADDRESS;
                        if (from === 'ETH') url += '&inputCurrency=ETH';
                        else url += '&inputCurrency=' + USDC_ADDRESS;
                        url += '&exactAmount=' + amount;
                        window.open(url, '_blank');
                        swapStatus.innerHTML = '✅ Redirecting to Uniswap...';
                    });
                }
            } catch (e) {
                document.getElementById('errorBox').innerHTML = 'Critical error: ' + e.message;
            }
        })();
    </script>
</body>
</html>
