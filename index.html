<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Funders Network</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h1 { text-align: center; color: #333; margin-bottom: 20px; }
        button {
            padding: 10px 15px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: #4CAF50;
            color: white;
            margin: 5px;
        }
        button.secondary { background: #2196F3; }
        button.danger { background: #f44336; }
        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .card {
            background: #f9f9f9;
            border: 1px solid #eee;
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
        }
        .hidden { display: none; }
        .tabs {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .tab {
            padding: 8px 16px;
            background: #ddd;
            border-radius: 20px;
            cursor: pointer;
        }
        .tab.active { background: #4CAF50; color: white; }
        .wallet-info {
            background: #e3f2fd;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            word-break: break-all;
        }
        .post-actions { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 10px; }
        .comment { margin-left: 20px; padding: 5px; border-left: 2px solid #4CAF50; }
        .progress { width: 100%; height: 20px; background: #eee; border-radius: 10px; overflow: hidden; }
        .progress-bar { height: 100%; background: #4CAF50; width: 0%; }
        #debug { background: #ffeb3b; padding: 10px; border-radius: 5px; margin-top: 10px; white-space: pre-wrap; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Social Funders Network</h1>

        <div id="walletSection">
            <button id="connectBtn">Connect Wallet</button>
            <div id="walletInfo" class="wallet-info hidden"></div>
        </div>

        <div id="debug"></div>

        <div id="app" class="hidden">
            <div class="tabs">
                <div class="tab active" data-tab="feed">Feed</div>
                <div class="tab" data-tab="swap">Swap</div>
                <div class="tab" data-tab="campaigns">Campaigns</div>
                <div class="tab" data-tab="admin" id="adminTab">Admin</div>
            </div>

            <!-- Feed Tab -->
            <div id="feedTab" class="tab-content">
                <h3>Create Post</h3>
                <textarea id="postContent" placeholder="What's on your mind?"></textarea>
                <input id="postImage" placeholder="Image URL (optional)">
                <button id="createPostBtn">Post</button>
                <h3>Feed</h3>
                <div id="postsList"></div>
            </div>

            <!-- Swap Tab -->
            <div id="swapTab" class="tab-content hidden">
                <h3>Get FUND Tokens</h3>
                <div>
                    <select id="fromToken">
                        <option value="ETH">ETH</option>
                        <option value="USDC">USDC</option>
                    </select>
                    <input type="number" id="fromAmount" placeholder="Amount">
                    <button id="swapRedirectBtn">Swap on Uniswap</button>
                    <div id="swapStatus"></div>
                </div>
            </div>

            <!-- Campaigns Tab -->
            <div id="campaignsTab" class="tab-content hidden">
                <h3>Start a Campaign</h3>
                <input id="campaignTitle" placeholder="Title">
                <textarea id="campaignDescription" placeholder="Description"></textarea>
                <input id="campaignGoal" type="number" placeholder="Goal (FUND)">
                <input id="campaignDeadline" type="date" placeholder="Deadline">
                <button id="createCampaignBtn">Create</button>
                <h3>Active Campaigns</h3>
                <div id="campaignsList"></div>
            </div>

            <!-- Admin Tab -->
            <div id="adminTab" class="tab-content hidden">
                <h3>Manage Posts</h3>
                <div id="adminPostsList"></div>
                <h3>Manage Campaigns</h3>
                <div id="adminCampaignsList"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <script>
        // Simple debug function
        const debugDiv = document.getElementById('debug');
        function debug(msg) {
            console.log(msg);
            if (debugDiv) debugDiv.innerHTML += msg + '<br>';
        }
        debug('Page loaded');

        // Configuration
        const FUND_ADDRESS = '0x06396aa215ef3fa2945c535be9c2ddc4e80a9b07';
        const USDC_ADDRESS = '0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913';
        const ADMIN_WALLETS = ['0x8F1BE8D1331f6968680bC141339bb246f68aD899'];

        let provider, signer, fundContract, userAddress, isAdmin = false;
        let posts = [], campaigns = [], following = [];

        // Load from localStorage
        function loadData() {
            try {
                posts = JSON.parse(localStorage.getItem('posts') || '[]');
                campaigns = JSON.parse(localStorage.getItem('campaigns') || '[]');
                following = JSON.parse(localStorage.getItem('following') || '[]');
            } catch (e) { debug('Error loading data: ' + e.message); }
        }
        function saveData() {
            localStorage.setItem('posts', JSON.stringify(posts));
            localStorage.setItem('campaigns', JSON.stringify(campaigns));
            localStorage.setItem('following', JSON.stringify(following));
        }
        loadData();

        // DOM elements
        const connectBtn = document.getElementById('connectBtn');
        const walletInfo = document.getElementById('walletInfo');
        const appDiv = document.getElementById('app');
        const tabs = document.querySelectorAll('.tab');
        const adminTab = document.getElementById('adminTab');
        let currentFeed = 'all'; // not implemented fully for simplicity

        // ========== WALLET CONNECTION ==========
        connectBtn.addEventListener('click', async () => {
            debug('Connect clicked');
            if (!window.ethereum) {
                alert('No wallet detected. Open in Trust Wallet.');
                return;
            }
            try {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                debug('Accounts: ' + accounts[0]);
                userAddress = accounts[0];
                provider = new ethers.providers.Web3Provider(window.ethereum);
                signer = provider.getSigner();

                const network = await provider.getNetwork();
                debug('Network: ' + network.chainId);
                if (network.chainId !== 8453) {
                    alert('Please switch to Base network.');
                    return;
                }

                // Simple FUND contract instance (for balance)
                fundContract = new ethers.Contract(FUND_ADDRESS, [
                    'function balanceOf(address) view returns (uint256)',
                    'function decimals() view returns (uint8)'
                ], provider);
                const decimals = await fundContract.decimals();
                const balance = await fundContract.balanceOf(userAddress);
                const formatted = ethers.utils.formatUnits(balance, decimals);

                walletInfo.innerHTML = `Connected: ${userAddress}<br>FUND Balance: ${parseFloat(formatted).toFixed(2)}`;
                walletInfo.classList.remove('hidden');
                connectBtn.style.display = 'none';
                appDiv.classList.remove('hidden');

                isAdmin = ADMIN_WALLETS.includes(userAddress.toLowerCase());
                if (!isAdmin) adminTab.style.display = 'none';

                // Render
                renderFeed();
                renderCampaigns();
                if (isAdmin) renderAdminPanels();
            } catch (err) {
                debug('Error: ' + err.message);
                alert('Connection failed: ' + err.message);
            }
        });

        // Tab switching
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                const tabName = tab.dataset.tab;
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
                document.getElementById(tabName + 'Tab').classList.remove('hidden');
                if (tabName === 'feed') renderFeed();
                if (tabName === 'campaigns') renderCampaigns();
                if (tabName === 'admin' && isAdmin) renderAdminPanels();
            });
        });

        // ========== FEED ==========
        function renderFeed() {
            const list = document.getElementById('postsList');
            if (!posts.length) {
                list.innerHTML = '<p>No posts yet.</p>';
                return;
            }
            list.innerHTML = posts.slice().reverse().map(p => `
                <div class="card">
                    <strong>${p.username || p.author.slice(0,6)}</strong>
                    <p>${p.content}</p>
                    ${p.imageUrl ? `<img src="${p.imageUrl}" style="max-width:100%">` : ''}
                    <div class="post-actions">
                        <button class="like-btn" data-id="${p.id}">❤️ ${p.likes ? p.likes.length : 0}</button>
                        <button class="tip-btn" data-recipient="${p.author}">💸 Tip</button>
                    </div>
                </div>
            `).join('');
            document.querySelectorAll('.like-btn').forEach(btn => btn.addEventListener('click', (e) => likePost(e.target.dataset.id)));
            document.querySelectorAll('.tip-btn').forEach(btn => btn.addEventListener('click', (e) => sendTip(e.target.dataset.recipient)));
        }

        function likePost(id) {
            if (!userAddress) return alert('Connect first');
            const post = posts.find(p => p.id == id);
            if (!post) return;
            if (!post.likes) post.likes = [];
            const idx = post.likes.indexOf(userAddress);
            if (idx === -1) post.likes.push(userAddress); else post.likes.splice(idx, 1);
            saveData(); renderFeed();
        }

        document.getElementById('createPostBtn').addEventListener('click', () => {
            if (!userAddress) return alert('Connect first');
            const content = document.getElementById('postContent').value.trim();
            if (!content) return alert('Enter content');
            const img = document.getElementById('postImage').value.trim();
            posts.push({
                id: Date.now(),
                author: userAddress,
                username: userAddress.slice(0,6) + '...',
                content,
                imageUrl: img,
                likes: [],
                comments: []
            });
            saveData();
            document.getElementById('postContent').value = '';
            document.getElementById('postImage').value = '';
            renderFeed();
        });

        // ========== TIPPING ==========
        async function sendTip(recipient) {
            if (!userAddress || !signer) return alert('Connect first');
            const amount = prompt('Enter FUND amount to tip:');
            if (!amount || amount <= 0) return;
            try {
                const contract = new ethers.Contract(FUND_ADDRESS, [
                    'function transfer(address to, uint256 amount) returns (bool)'
                ], signer);
                const decimals = await fundContract.decimals();
                const tx = await contract.transfer(recipient, ethers.utils.parseUnits(amount, decimals));
                alert(`Tip sent! Tx: ${tx.hash}`);
                await tx.wait();
                alert('Confirmed');
            } catch (err) { alert('Error: ' + err.message); }
        }

        // ========== CAMPAIGNS ==========
        function renderCampaigns() {
            const list = document.getElementById('campaignsList');
            if (!campaigns.length) {
                list.innerHTML = '<p>No campaigns.</p>';
                return;
            }
            list.innerHTML = campaigns.filter(c => c.status === 'active').map(c => `
                <div class="card">
                    <h4>${c.title}</h4>
                    <p>${c.description}</p>
                    <p>Goal: ${c.goal} FUND</p>
                    <p>Raised: ${c.raised || 0} FUND</p>
                    <div class="progress"><div class="progress-bar" style="width:${Math.min(100, ((c.raised||0)/c.goal)*100)}%"></div></div>
                    <p>Deadline: ${c.deadline}</p>
                    <button class="donate-btn" data-creator="${c.creator}" data-id="${c.id}">Donate</button>
                </div>
            `).join('');
            document.querySelectorAll('.donate-btn').forEach(btn => btn.addEventListener('click', (e) => donate(e.target.dataset.creator, e.target.dataset.id)));
        }

        document.getElementById('createCampaignBtn').addEventListener('click', () => {
            if (!userAddress) return alert('Connect first');
            const title = document.getElementById('campaignTitle').value.trim();
            const desc = document.getElementById('campaignDescription').value.trim();
            const goal = parseFloat(document.getElementById('campaignGoal').value);
            const deadline = document.getElementById('campaignDeadline').value;
            if (!title || !desc || !goal || !deadline) return alert('Fill all fields');
            campaigns.push({
                id: Date.now(),
                creator: userAddress,
                title,
                description: desc,
                goal,
                raised: 0,
                deadline,
                status: 'active'
            });
            saveData();
            document.getElementById('campaignTitle').value = '';
            document.getElementById('campaignDescription').value = '';
            document.getElementById('campaignGoal').value = '';
            document.getElementById('campaignDeadline').value = '';
            renderCampaigns();
        });

        async function donate(creator, campaignId) {
            if (!userAddress || !signer) return alert('Connect first');
            const amount = prompt('Enter FUND amount to donate:');
            if (!amount || amount <= 0) return;
            try {
                const contract = new ethers.Contract(FUND_ADDRESS, [
                    'function transfer(address to, uint256 amount) returns (bool)'
                ], signer);
                const decimals = await fundContract.decimals();
                const tx = await contract.transfer(creator, ethers.utils.parseUnits(amount, decimals));
                alert(`Donation sent! Tx: ${tx.hash}`);
                await tx.wait();
                const camp = campaigns.find(c => c.id == campaignId);
                if (camp) {
                    camp.raised = (camp.raised || 0) + parseFloat(amount);
                    saveData();
                    renderCampaigns();
                }
                alert('Confirmed');
            } catch (err) { alert('Error: ' + err.message); }
        }

        // ========== ADMIN ==========
        function renderAdminPanels() {
            if (!isAdmin) return;
            document.getElementById('adminPostsList').innerHTML = posts.map(p => `<div class="card">${p.content} <button class="danger" data-id="${p.id}" data-action="deletePost">Delete</button></div>`).join('');
            document.getElementById('adminCampaignsList').innerHTML = campaigns.map(c => `<div class="card">${c.title} <button class="danger" data-id="${c.id}" data-action="deleteCampaign">Delete</button></div>`).join('');
            document.querySelectorAll('[data-action="deletePost"]').forEach(btn => btn.addEventListener('click', (e) => deletePost(e.target.dataset.id)));
            document.querySelectorAll('[data-action="deleteCampaign"]').forEach(btn => btn.addEventListener('click', (e) => deleteCampaign(e.target.dataset.id)));
        }
        function deletePost(id) { posts = posts.filter(p => p.id != id); saveData(); renderFeed(); if (isAdmin) renderAdminPanels(); }
        function deleteCampaign(id) { campaigns = campaigns.filter(c => c.id != id); saveData(); renderCampaigns(); if (isAdmin) renderAdminPanels(); }

        // ========== SWAP REDIRECT ==========
        const swapRedirectBtn = document.getElementById('swapRedirectBtn');
        const fromAmount = document.getElementById('fromAmount');
        const fromToken = document.getElementById('fromToken');
        const swapStatus = document.getElementById('swapStatus');

        swapRedirectBtn.addEventListener('click', () => {
            if (!userAddress) {
                swapStatus.innerHTML = 'Connect wallet first';
                return;
            }
            const amount = fromAmount.value;
            const from = fromToken.value;
            if (!amount || parseFloat(amount) <= 0) {
                swapStatus.innerHTML = 'Enter a valid amount';
                return;
            }
            let url = 'https://app.uniswap.org/#/swap?chain=base&outputCurrency=' + FUND_ADDRESS;
            if (from === 'ETH') url += '&inputCurrency=ETH';
            else url += '&inputCurrency=' + USDC_ADDRESS;
            url += '&exactAmount=' + amount;
            window.open(url, '_blank');
            swapStatus.innerHTML = 'Redirecting to Uniswap...';
        });
    </script>
</body>
</html>
